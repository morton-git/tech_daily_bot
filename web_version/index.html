<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech Daily Bot - AI 科技新聞摘要平台</title>
    <meta name="description" content="AI 驅動的科技新聞摘要平台，自動抓取、分析、摘要最新科技資訊">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --primary-color: #2563eb;
            --secondary-color: #10b981;
            --accent-color: #f59e0b;
            --dark-color: #1f2937;
            --light-color: #f3f4f6;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--gradient-1);
            min-height: 100vh;
            color: var(--dark-color);
        }
        
        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: var(--gradient-2);
            color: white;
            padding: 60px 40px;
            border-radius: 25px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="50" font-size="100" fill="rgba(255,255,255,0.05)">🤖</text></svg>');
            background-size: 100px 100px;
            animation: float 20s infinite linear;
        }
        
        @keyframes float {
            0% { transform: translateX(0) translateY(0); }
            100% { transform: translateX(-100px) translateY(-100px); }
        }
        
        .header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
        }
        
        .header p {
            font-size: 1.4rem;
            opacity: 0.95;
            margin: 0;
            position: relative;
            z-index: 1;
        }
        
        .header .tech-badges {
            margin-top: 20px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }
        
        .tech-badge {
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--gradient-2);
        }
        
        .stat-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }
        
        .stat-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            background: var(--gradient-2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 5px;
        }
        
        .stat-label {
            color: var(--dark-color);
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .controls-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .controls-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 30px;
            color: var(--dark-color);
        }
        
        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        
        .btn-custom {
            background: var(--gradient-2);
            color: white;
            border: none;
            padding: 18px 30px;
            border-radius: 15px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.3);
            position: relative;
            overflow: hidden;
        }
        
        .btn-custom::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }
        
        .btn-custom:hover::before {
            left: 100%;
        }
        
        .btn-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(37, 99, 235, 0.4);
        }
        
        .btn-custom:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .loading-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 60px;
            border-radius: 25px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none;
        }
        
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 4px solid var(--light-color);
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 30px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 1.5rem;
            color: var(--primary-color);
            margin-bottom: 15px;
        }
        
        .loading-subtitle {
            color: #6b7280;
            font-size: 1.1rem;
        }
        
        .progress-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none;
        }
        
        .progress-bar-custom {
            height: 8px;
            background: var(--light-color);
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--gradient-2);
            border-radius: 10px;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .chart-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .chart-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 25px;
            color: var(--dark-color);
            text-align: center;
        }
        
        .result-section {
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none;
        }
        
        .result-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--light-color);
        }
        
        .result-icon {
            font-size: 2.5rem;
            margin-right: 20px;
        }
        
        .result-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--dark-color);
            margin: 0;
        }
        
        .result-time {
            color: #6b7280;
            font-size: 1rem;
            margin-left: auto;
        }
        
        .result-content {
            background: var(--light-color);
            padding: 30px;
            border-radius: 15px;
            line-height: 1.8;
            font-size: 1.1rem;
            color: var(--dark-color);
            white-space: pre-wrap;
            margin-bottom: 25px;
        }
        
        .source-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .source-tag {
            background: var(--gradient-2);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .alert-section {
            margin-bottom: 30px;
        }
        
        .alert-custom {
            border-radius: 15px;
            border: none;
            padding: 20px 25px;
            font-weight: 500;
        }
        
        .footer {
            background: var(--dark-color);
            color: white;
            padding: 40px;
            border-radius: 25px;
            text-align: center;
            margin-top: 30px;
        }
        
        .footer-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
        }
        
        .tech-stack {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        
        .tech-item {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.1);
            padding: 10px 20px;
            border-radius: 25px;
            transition: all 0.3s ease;
        }
        
        .tech-item:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }
        
        .modal-custom {
            border-radius: 20px;
        }
        
        .modal-header {
            background: var(--gradient-2);
            color: white;
            border-radius: 20px 20px 0 0;
            border: none;
        }
        
        .modal-body {
            padding: 30px;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 2.5rem;
            }
            
            .header p {
                font-size: 1.1rem;
            }
            
            .controls-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-grid {
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="main-container">
        <!-- Header -->
        <div class="header">
            <h1><i class="fas fa-robot"></i> Tech Daily Bot</h1>
            <p>AI 驅動的科技新聞摘要平台 • 即時分析 • 智能分類</p>
            <div class="tech-badges">
                <span class="tech-badge">🤖 AI 驅動</span>
                <span class="tech-badge">📡 即時更新</span>
                <span class="tech-badge">🎯 智能分析</span>
                <span class="tech-badge">📊 視覺化</span>
            </div>
        </div>
        
        <!-- Stats Grid -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-newspaper"></i></div>
                <div class="stat-number" id="newsCount">0</div>
                <div class="stat-label">今日新聞</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-globe"></i></div>
                <div class="stat-number" id="sourceCount">30+</div>
                <div class="stat-label">資訊來源</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-brain"></i></div>
                <div class="stat-number" id="aiStatus">檢查中</div>
                <div class="stat-label">AI 狀態</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-clock"></i></div>
                <div class="stat-number" id="updateTime">--:--</div>
                <div class="stat-label">最後更新</div>
            </div>
        </div>
        
        <!-- Alert Section -->
        <div class="alert-section" id="alertContainer"></div>
        
        <!-- Controls Section -->
        <div class="controls-section">
            <h2 class="controls-title">🚀 選擇分析模式</h2>
            <div class="controls-grid">
                <button class="btn-custom" onclick="getNews()">
                    <i class="fas fa-newspaper"></i><br>今日新聞
                </button>
                <button class="btn-custom" onclick="getSocial()">
                    <i class="fas fa-users"></i><br>社群動態
                </button>
                <button class="btn-custom" onclick="getFull()">
                    <i class="fas fa-chart-line"></i><br>完整報告
                </button>
                <button class="btn-custom" onclick="getAnalysis()">
                    <i class="fas fa-brain"></i><br>AI 深度分析
                </button>
            </div>
        </div>
        
        <!-- Loading Section -->
        <div class="loading-section" id="loadingSection">
            <div class="loading-spinner"></div>
            <div class="loading-text">AI 正在分析中...</div>
            <div class="loading-subtitle">抓取最新資訊 • 智能摘要 • 自動分類</div>
            <div class="progress-bar-custom">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div id="loadingStatus">準備開始...</div>
        </div>
        
        <!-- Progress Section -->
        <div class="progress-section" id="progressSection">
            <h3><i class="fas fa-tasks"></i> 處理進度</h3>
            <div id="progressSteps"></div>
        </div>
        
        <!-- Chart Section -->
        <div class="chart-section">
            <h3 class="chart-title"><i class="fas fa-chart-pie"></i> 資訊來源分布</h3>
            <canvas id="sourceChart" width="400" height="200"></canvas>
        </div>
        
        <!-- Result Section -->
        <div class="result-section" id="resultSection">
            <div class="result-header">
                <div class="result-icon" id="resultIcon">📰</div>
                <h2 class="result-title" id="resultTitle">分析結果</h2>
                <span class="result-time" id="resultTime"></span>
            </div>
            <div class="result-content" id="resultContent">
                分析結果將在這裡顯示...
            </div>
            <div class="source-tags" id="sourceTags"></div>
        </div>
        
        <!-- Footer -->
        <div class="footer">
            <h3 class="footer-title"><i class="fas fa-code"></i> Tech Daily Bot v2.0</h3>
            <p>開源 AI 新聞平台 • 純前端實現 • 雲端部署</p>
            <div class="tech-stack">
                <div class="tech-item">
                    <i class="fab fa-html5"></i> HTML5
                </div>
                <div class="tech-item">
                    <i class="fab fa-css3-alt"></i> CSS3
                </div>
                <div class="tech-item">
                    <i class="fab fa-js"></i> JavaScript
                </div>
                <div class="tech-item">
                    <i class="fas fa-brain"></i> AI API
                </div>
                <div class="tech-item">
                    <i class="fab fa-github"></i> Open Source
                </div>
            </div>
        </div>
    </div>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // 全局變數
        let sourceChart = null;
        let currentRequest = null;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            checkStatus();
            initializeChart();
            
            // 每 30 秒檢查一次狀態
            setInterval(checkStatus, 30000);
        });
        
        // 初始化圖表
        function initializeChart() {
            const ctx = document.getElementById('sourceChart').getContext('2d');
            sourceChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['TechCrunch', 'The Verge', 'Engadget', 'TechNews', '其他'],
                    datasets: [{
                        data: [0, 0, 0, 0, 0],
                        backgroundColor: [
                            '#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6',
                            '#ec4899', '#14b8a6', '#f97316', '#06b6d4', '#84cc16'
                        ],
                        borderWidth: 2,
                        borderColor: '#fff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 20,
                                font: {
                                    size: 14
                                }
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return context.label + ': ' + context.parsed + ' 篇';
                                }
                            }
                        }
                    }
                }
            });
        }
        
        // 顯示載入畫面
        function showLoading(message = 'AI 正在分析中...') {
            document.getElementById('loadingSection').style.display = 'block';
            document.getElementById('progressSection').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';
            document.getElementById('loadingText').textContent = message;
            
            // 重置進度
            document.getElementById('progressFill').style.width = '0%';
            updateProgress('準備開始...');
            
            // 開始進度動畫
            simulateProgress();
        }
        
        // 隱藏載入畫面
        function hideLoading() {
            document.getElementById('loadingSection').style.display = 'none';
            document.getElementById('progressSection').style.display = 'none';
        }
        
        // 模擬進度
        function simulateProgress() {
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress > 90) {
                    progress = 90;
                    clearInterval(interval);
                }
                document.getElementById('progressFill').style.width = progress + '%';
            }, 500);
        }
        
        // 更新進度狀態
        function updateProgress(status) {
            document.getElementById('loadingStatus').textContent = status;
            
            const steps = document.getElementById('progressSteps');
            const stepHtml = `
                <div class="alert alert-info">
                    <i class="fas fa-info-circle"></i> ${status}
                </div>
            `;
            steps.innerHTML = stepHtml;
        }
        
        // 顯示結果
        function showResult(data, title, icon) {
            hideLoading();
            
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('resultIcon').textContent = icon;
            document.getElementById('resultTitle').textContent = title;
            document.getElementById('resultTime').textContent = new Date().toLocaleString();
            document.getElementById('resultContent').textContent = data.content || '處理中...';
            
            // 更新來源標籤
            const sourceTags = document.getElementById('sourceTags');
            sourceTags.innerHTML = '';
            
            if (data.sources && data.sources.length > 0) {
                data.sources.forEach(source => {
                    const tag = document.createElement('span');
                    tag.className = 'source-tag';
                    tag.textContent = source;
                    sourceTags.appendChild(tag);
                });
            }
            
            // 更新統計
            if (data.news_count) {
                document.getElementById('newsCount').textContent = data.news_count;
            }
            document.getElementById('updateTime').textContent = new Date().toLocaleTimeString();
            
            // 更新圖表
            if (data.source_stats) {
                updateChart(data.source_stats);
            }
            
            // 顯示成功訊息
            showAlert('✅ 分析完成！', 'success');
        }
        
        // 更新圖表
        function updateChart(sourceStats) {
            if (!sourceChart || !sourceStats) return;
            
            const labels = Object.keys(sourceStats);
            const data = Object.values(sourceStats);
            
            sourceChart.data.labels = labels;
            sourceChart.data.datasets[0].data = data;
            sourceChart.update();
        }
        
        // 顯示警告
        function showAlert(message, type = 'info') {
            const alertContainer = document.getElementById('alertContainer');
            const alertHtml = `
                <div class="alert alert-${type} alert-dismissible fade show alert-custom" role="alert">
                    ${message}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            `;
            alertContainer.innerHTML = alertHtml;
            
            // 5秒後自動隱藏
            setTimeout(() => {
                const alert = alertContainer.querySelector('.alert');
                if (alert) {
                    alert.remove();
                }
            }, 5000);
        }
        
        // 檢查系統狀態
        async function checkStatus() {
            try {
                // 模擬 API 檢查
                const aiAvailable = Math.random() > 0.1; // 90% 機率正常
                
                document.getElementById('aiStatus').textContent = aiAvailable ? '✅ 正常' : '❌ 異常';
                document.getElementById('sourceCount').textContent = '30+';
                
                if (aiAvailable) {
                    // 不顯示成功訊息，避免干擾
                } else {
                    showAlert('⚠️ AI 服務暫時無法使用', 'warning');
                }
            } catch (error) {
                document.getElementById('aiStatus').textContent = '❌ 離線';
                showAlert('⚠️ 部分服務暫時無法使用', 'warning');
            }
        }
        
        // 獲取新聞
        async function getNews() {
            if (currentRequest) {
                currentRequest.abort();
            }
            
            showLoading('正在抓取最新科技新聞...');
            updateProgress('📡 連接 RSS 來源...');
            
            try {
                // 模擬 API 調用
                await simulateAPICall('news');
                
                const mockData = {
                    content: `📰 **今日科技新聞摘要**

## 🔥 重要焦點

### 1. OpenAI 發布 GPT-5 預告版本
- **影響**：AI 產業將迎來新的技術突破
- **關鍵點**：多模態能力大幅提升，支援圖像、音訊、視訊綜合處理
- **市場反應**：股價上漲 15%，投資者信心增強

### 2. 台積電宣布 3nm 製程新突破
- **技術亮點**：功耗降低 30%，效能提升 25%
- **產業影響**：手機、筆電效能將顯著提升
- **供應鏈**：蘋果、英特爾已下訂大量訂單
